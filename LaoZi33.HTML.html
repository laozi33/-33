<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老子33 (Laozi33) 每日阅读赚币中心</title>
    <script src="https://jsdelivr.net" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0e14; color: #ffffff; padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { background: #161b26; padding: 25px; border-radius: 20px; border: 1px solid #212e46; width: 100%; max-width: 460px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h2 { text-align: center; color: #4e83fd; margin: 0 0 5px 0; font-size: 22px; }
        .sub-title { text-align: center; font-size: 12px; color: #8fa0c2; margin-bottom: 20px; }
        
        /* 📖 文章阅读视窗 */
        .article-window { background: #0e1118; border-radius: 12px; border: 1px solid #2d384e; padding: 15px; height: 180px; overflow-y: auto; font-size: 14px; line-height: 1.6; color: #cbd5e1; margin-bottom: 15px; }
        .article-title { color: #00ff88; font-weight: bold; margin-bottom: 8px; font-size: 15px; border-bottom: 1px dashed #2d384e; padding-bottom: 5px; }
        
        /* 🔌 状态显示面板 */
        button { width: 100%; padding: 12px; background: #3b71f7; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #1a54e6; }
        button:disabled { background: #2c374e; color: #7384a6; cursor: not-allowed; }
        .info-box { background: #1c2333; padding: 12px; border-radius: 8px; font-size: 13px; border: 1px solid #2d384e; margin-bottom: 15px; }
        .status-badge { text-align: center; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .success { color: #00ff88; } .danger { color: #ff3b30; }
        
        /* 📋 凭证框 */
        .voucher-box { background: #111622; border: 1px dashed #4e83fd; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 12px; display: none; }
        .voucher-text { background: #0e1118; padding: 8px; border-radius: 4px; color: #ffbc00; word-break: break-all; font-family: monospace; margin: 5px 0; border: 1px solid #1c2333; user-select: all; }
    </style>
</head>
<body>

<div class="container">
    <h2>每日阅读赚币中心</h2>
    <div class="sub-title">Read-to-Earn：每日点击完读，赢取 500 枚代币</div>

    <!-- 1. 钱包状态区 -->
    <button id="connectWalletBtn">🔌 第一步：连接钱包激活审计</button>
    <div class="info-box" style="margin-top: 10px;">
        <div><strong>当前账户:</strong> <span id="accountStatus" class="danger">未连接</span></div>
        <div><strong>老子33持仓:</strong> <span id="tokenBalance" style="color:#00ff88; font-weight:bold;">0.00</span> 枚</div>
        <div id="antiBotBadge" class="status-badge"></div>
    </div>

    <!-- 2. 今日焦点文章视窗 -->
    <div class="article-window">
        <div class="article-title" id="articleTitle">📌 今日文献：关于极浅池的分布式防御优势</div>
        <div id="articleContent">
            请先在上方连接 Web3 钱包。系统通过持仓审计（≥ 10 枚老子33）后，将自动为您解锁并加载今日的科研文献文章。
        </div>
    </div>

    <!-- 3. 核心功能触发按钮 -->
    <button id="readBtn" disabled>🔒 权限锁定：请先通过持仓验证</button>

    <!-- 4. 防篡改完读凭证生成区 -->
    <div class="voucher-box" id="voucherBox">
        🎉 <strong>今日文章阅读已完成！</strong><br>
        <span style="color: #8fa0c2;">请点击下方按钮一键复制凭证，贴到社区评论区申请 500 枚代币：</span>
        <div class="voucher-text" id="voucherText"></div>
        <button id="copyBtn" style="background: #00ff88; color: #0e1118; margin-top: 5px; padding: 8px;">📋 一键复制完读凭证</button>
    </div>
</div>

<script>
const TARGET_TOKEN = "0x69bbb2ef4bce2dbaafcc4b6a1fef4a7dd6d99e7a"; 
const ERC20_ABI = [{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}];

// 预设的每日轮换文章库（可自由追加修改）
const ARTICLES = [
    { title: "📄 论老子33微盘生态与可重复使用微型火箭研究", content: "由于商业航天领域属于典型的高资本壁垒、重工业科技，老子33项目方宣布开展小型液体可重复使用火箭回收算法研究。通过将分布式账本的全球协作范式与航天供应链深度融合，探索Web3科研众筹。当前在PancakeSwap维持的极浅资金池（2万多元）能天然阻断高频量化机器人的夹击侵蚀，客观上为科研生态散户筑起罕见护城河..." },
    { title: "📄 福建地区传统房屋修缮与家装智能化升级蓝图", content: "数字创新必须反哺实体产业。老子33正式宣布开辟福建地区（福州、厦门、泉州等）的房屋修缮与高品质家庭装潢市场。旨在利用去中心化不可篡改的智能合约，实现建筑原材采购透明化、工时劳务结算链上存证化。通过资产潜力的市值对标传统家装的广阔空间，规避传统家装工程款无限拖欠等实体死结..." }
];

let provider, signer, userAddress;
let isPassedAudit = false; // 核心底层风控防刷锁

// 倒计时刷新器：网页加载时自动检测上一次的阅读冷却时间
window.addEventListener('load', () => {
    checkCooldown();
});

function checkCooldown() {
    const lastReadTime = localStorage.getItem('l33_last_read_time');
    if (lastReadTime) {
        const timePassed = Date.now() - parseInt(lastReadTime);
        const cooldown = 24 * 60 * 60 * 1000; // 24小时冷却毫秒数
        
        if (timePassed < cooldown) {
            const timeLeft = cooldown - timePassed;
            updateCooldownTimer(timeLeft);
            return true; // 处于冷却中
        }
    }
    return false; // 可自由阅读
}

function updateCooldownTimer(timeLeft) {
    isPassedAudit = false;
    document.getElementById('readBtn').disabled = true;
    
    const timer = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timer);
            if(userAddress) checkTokenBalance(); // 冷却结束，自动恢复按钮
            return;
        }
        timeLeft -= 1000;
        const hrs = Math.floor(timeLeft / (60 * 60 * 1000));
        const mins = Math.floor((timeLeft % (60 * 60 * 1000)) / (60 * 1000));
        const secs = Math.floor((timeLeft % (60 * 1000)) / 1000);
        document.getElementById('readBtn').innerText = `⏳ 冷却中：请等待 ${hrs}小时${mins}分${secs}秒`;
    }, 1000);
}

// 连接钱包与审计激活
document.getElementById('connectWalletBtn').addEventListener('click', async () => {
    if (typeof window.ethereum !== 'undefined') {
        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            userAddress = await signer.getAddress();

            document.getElementById('accountStatus').innerText = `${userAddress.substring(0,6)}...${userAddress.substring(38)}`;
            document.getElementById('accountStatus').className = "success";
            document.getElementById('connectWalletBtn').innerText = "✓ 钱包及链上雷达已同步";
            document.getElementById('connectWalletBtn').style.background = "#2c374e";

            await checkTokenBalance();
        } catch (e) {
            console.error(e);
        }
    } else {
        alert("请在手机钱包DApp浏览器或电脑MetaMask中打开此网页！");
    }
});

// 持仓雷达审计
async function checkTokenBalance() {
    try {
        const contract = new ethers.Contract(TARGET_TOKEN, ERC20_ABI, provider);
        const rawBalance = await contract.balanceOf(userAddress);
        const formattedBalance = parseFloat(ethers.utils.formatUnits(rawBalance, 18));
        
        document.getElementById('tokenBalance').innerText = formattedBalance.toFixed(2);
        const badge = document.getElementById('antiBotBadge');

        // 判定防羊毛硬核锁
        if (formattedBalance >= 10.0) {
            badge.innerText = "✓ 散户防刷持仓验证通过";
            badge.className = "status-badge success";
            
            // 加载今日文章内容
            const dayIndex = new Date().getDate() % ARTICLES.length;
            document.getElementById('articleTitle').innerText = ARTICLES[dayIndex].title;
            document.getElementById('articleContent').innerText = ARTICLES[dayIndex].content;

            // 如果当前没有处于24小时冷却期，则彻底解锁按钮
            if (!checkCooldown()) {
                isPassedAudit = true;
                document.getElementById('readBtn').disabled = false;
                document.getElementById('readBtn').innerText = "📖 今日文献已加载，点击签到完读";
            }
        } else {
            badge.innerText = "🚨 拦截：持仓不足 10 枚，判定为刷量机器人";
            badge.className = "status-badge danger";
            isPassedAudit = false;
            document.getElementById('readBtn').disabled = true;
            document.getElementById('readBtn').innerText = "🔒 权限锁定：持仓未达标";
            document.getElementById('articleContent').innerText = "❌ 持仓审计未通过！您的钱包余额未达10枚老子33代币门槛，防羊毛雷达已拒绝向您展示科研文章内容。请先去DEX池子里增持！";
        }
    } catch (e) {
        console.error(e);
    }
}

// 点击阅读完成处理
document.getElementById('readBtn').addEventListener('click', () => {
    // 终极防守：防止用户按F12恶意删除 disabled 属性进行作弊
    if (!isPassedAudit || checkCooldown()) {
        alert("安全系统警报：检测到非法越权提交！您的持仓不符或处于冷却期中。");
        return;
    }

    const nowTimestamp = Date.now();
    localStorage.setItem('l33_last_read_time', nowTimestamp.toString());

    // 🔒 智能防伪算法：生成一段带有“时间戳 + 散户钱包 + 500枚代币识别码”的伪密文凭证
    // 这样散户无法自己伪造凭证，方便您的后台 Python 正则脚本进行真伪识别
    const generatedVoucher = `L33_READ_${nowTimestamp}_ADDR_${userAddress}_REWARD_500`;

    document.getElementById('voucherText').innerText = generatedVoucher;
    document.getElementById('voucherBox').style.display = "block";
    
    // 触发24小时冷却锁死
    checkCooldown();
});

// 一键复制
document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('voucherText').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("📋 完读凭证已成功复制到剪贴板！快去社群/评论区粘贴登记吧。");
    });
});
</script>
</body>
</html>
